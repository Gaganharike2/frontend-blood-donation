<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LifeLink | Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:Segoe UI;
}

.auth-box{
max-width:420px;
margin:auto;
margin-top:100px;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.logo{
font-size:24px;
font-weight:bold;
color:#e63946;
}

.strength-bar{
height:6px;
background:#ddd;
border-radius:5px;
margin-top:5px;
}

.strength-fill{
height:6px;
border-radius:5px;
width:0%;
}

.security-info{
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<div class="auth-box">

<div class="card p-4">

<div class="text-center mb-3">

<div class="logo">LifeLink</div>

<h4>Reset Password</h4>

<p class="text-muted">
Create a new secure password
</p>

</div>

<form id="resetForm">

<div class="mb-3">

<label>New Password</label>

<input
type="password"
class="form-control"
id="password"
placeholder="Enter new password"
required
>

<div class="strength-bar">
<div class="strength-fill" id="strengthFill"></div>
</div>

</div>

<div class="mb-3">

<label>Confirm Password</label>

<input
type="password"
class="form-control"
id="confirmPassword"
placeholder="Confirm new password"
required
>

</div>

<button
type="submit"
class="btn btn-danger w-100"
>
Reset Password
</button>

</form>

<div class="text-center mt-3">

<a href="login.html">
Back to Login
</a>

</div>

<hr>

<div class="security-info">

<p>🔐 Secure encrypted password reset</p>
<p>🛡 AI fraud detection monitoring</p>
<p>📍 Device & location verification</p>
<p>⚙ Enterprise security compliance</p>

</div>

</div>

</div>

</div>

<script>

const passwordInput=document.getElementById("password");
const strengthFill=document.getElementById("strengthFill");

passwordInput.addEventListener("input",function(){

let value=passwordInput.value;
let strength=0;

if(value.length>6) strength+=25;
if(/[A-Z]/.test(value)) strength+=25;
if(/[0-9]/.test(value)) strength+=25;
if(/[^A-Za-z0-9]/.test(value)) strength+=25;

strengthFill.style.width=strength+"%";

if(strength<=25)
strengthFill.style.background="red";

else if(strength<=50)
strengthFill.style.background="orange";

else if(strength<=75)
strengthFill.style.background="gold";

else
strengthFill.style.background="green";

});

document.getElementById("resetForm")
.addEventListener("submit",function(e){

e.preventDefault();

let password=document.getElementById("password").value;
let confirm=document.getElementById("confirmPassword").value;

if(password!==confirm){

alert("Passwords do not match");
return;

}

/* AJAX Request */

fetch("/api/reset-password",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
password:password
})

})
.then(res=>res.json())
.then(data=>{

alert("Password reset successful");
window.location="login.html";

})
.catch(err=>{

alert("Reset failed");

});

});

</script>

</body>

</html>
