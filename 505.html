<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LifeLink | Server Error</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:Segoe UI;
text-align:center;
}

.logo{
font-size:26px;
font-weight:bold;
color:#e63946;
}

.error-container{
margin-top:80px;
}

.error-code{
font-size:120px;
font-weight:bold;
color:#ff6b6b;
}

.error-text{
font-size:22px;
margin-bottom:20px;
}

.server-icon{
font-size:80px;
margin-bottom:20px;
animation:shake 1.5s infinite;
}

@keyframes shake{
0%{transform:rotate(0deg)}
25%{transform:rotate(3deg)}
50%{transform:rotate(-3deg)}
75%{transform:rotate(3deg)}
100%{transform:rotate(0deg)}
}

.status-box{
margin-top:30px;
padding:20px;
border-radius:10px;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

footer{
margin-top:60px;
background:#111;
color:white;
padding:20px;
}

</style>

</head>

<body>

<nav class="navbar navbar-light bg-white shadow-sm">

<div class="container">

<span class="logo">LifeLink</span>

<a href="index.html" class="btn btn-outline-danger btn-sm">
Home
</a>

</div>

</nav>


<div class="container error-container">

<div class="server-icon">⚙️</div>

<div class="error-code">500</div>

<div class="error-text">

Oops! Our server encountered an unexpected error.

</div>


<div class="mb-4">

<button class="btn btn-danger m-2" onclick="reloadPage()">
Reload Page
</button>

<button class="btn btn-outline-secondary m-2" onclick="goBack()">
Go Back
</button>

<a href="index.html" class="btn btn-outline-primary m-2">
Go Home
</a>

</div>


<div class="row justify-content-center">

<div class="col-md-6 status-box">

<h5>System Status</h5>

<p id="serverStatus">
Checking server status...
</p>

<button class="btn btn-primary" onclick="checkServer()">
Check Server Status
</button>

</div>

</div>


<div class="mt-5">

<h5>Report Server Issue</h5>

<div class="row justify-content-center">

<div class="col-md-6">

<input type="text" id="errorURL" class="form-control mb-2" placeholder="Page URL">

<textarea id="errorDesc" class="form-control mb-2" placeholder="Describe the issue"></textarea>

<button class="btn btn-warning w-100" onclick="reportServerError()">

Report Issue

</button>

</div>

</div>

</div>


<div class="mt-5">

<h6>Popular Pages</h6>

<a href="find-donor.html" class="btn btn-outline-secondary m-1">Find Donor</a>

<a href="hospitals.html" class="btn btn-outline-secondary m-1">Hospitals</a>

<a href="login.html" class="btn btn-outline-secondary m-1">Login</a>

<a href="register.html" class="btn btn-outline-secondary m-1">Register</a>

</div>

</div>


<footer>

© 2026 LifeLink Blood Donation Platform

</footer>


<script>

function reloadPage(){
location.reload();
}

function goBack(){
window.history.back();
}

function checkServer(){

fetch("/api/server-status")

.then(res=>res.json())

.then(data=>{

document.getElementById("serverStatus").innerText="Server Status: Online";

})

.catch(()=>{

document.getElementById("serverStatus").innerText="Server Status: Issue detected";

});

}


function reportServerError(){

let url=document.getElementById("errorURL").value;

let desc=document.getElementById("errorDesc").value;

fetch("/api/report-server-error",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

url:url,

description:desc

})

})

.then(res=>res.json())

.then(data=>{

alert("Server issue reported successfully.");

});

}

</script>

</body>

</html>
