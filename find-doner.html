<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeLink | Find Donor</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{background:#f4f6fb;font-family:'Poppins',sans-serif}
.navbar{background:white;box-shadow:0 5px 20px rgba(0,0,0,0.05)}
.logo img{height:55px}
.sidebar{background:white;padding:20px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.08)}
.card{border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.08);transition:0.3s}
.card:hover{transform:translateY(-5px)}
.map-container{height:350px;border-radius:20px;overflow:hidden}
.ai-badge{background:linear-gradient(45deg,#ff416c,#ff4b2b)}
.loader{display:none}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top">
<div class="container">
<a class="navbar-brand logo" href="index.html">
<img src="images/Logo.png">
</a>
<div class="ms-auto">
<a href="login.html" class="btn btn-outline-danger btn-sm me-2">Login</a>
<a href="register.html" class="btn btn-danger btn-sm">Register</a>
</div>
</div>
</nav>

<div class="container-fluid mt-4">
<div class="row">

<!-- ADVANCED FILTER SIDEBAR -->
<div class="col-lg-3">
<div class="sidebar">
<h5>Advanced Filters</h5>
<input type="text" id="searchInput" class="form-control mb-3" placeholder="Search name or city">

<select id="bloodGroup" class="form-select mb-3">
<option value="">Blood Group</option>
<option>A+</option>
<option>B+</option>
<option>O+</option>
<option>AB+</option>
</select>

<select id="availability" class="form-select mb-3">
<option value="">Availability</option>
<option>Available</option>
<option>Busy</option>
</select>

<select id="minRating" class="form-select mb-3">
<option value="">Min AI Rank</option>
<option value="80">80+</option>
<option value="90">90+</option>
</select>

<button class="btn btn-danger w-100" onclick="filterDonors()">Apply Filters</button>
</div>
</div>

<!-- MAIN CONTENT -->
<div class="col-lg-9">

<h4 class="mb-3">Available Donors</h4>
<p id="resultCount"></p>

<!-- GOOGLE MAP -->
<div class="map-container mb-4">
<iframe
width="100%"
height="100%"
frameborder="0"
style="border:0"
src="https://maps.google.com/maps?q=India&t=&z=5&ie=UTF8&iwloc=&output=embed"
allowfullscreen>
</iframe>
</div>

<div class="text-center loader" id="loader">
<div class="spinner-border text-danger"></div>
</div>

<div class="row" id="donorContainer"></div>

<!-- Pagination -->
<nav>
<ul class="pagination justify-content-center mt-4" id="pagination"></ul>
</nav>

</div>
</div>
</div>

<!-- DONOR PROFILE MODAL -->
<div class="modal fade" id="profileModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title" id="profileTitle"></h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body" id="profileBody"></div>
</div>
</div>
</div>

<!-- REQUEST CONFIRMATION MODAL -->
<div class="modal fade" id="requestModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">Confirm Blood Request</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<p>Are you sure you want to send a blood request?</p>
<button class="btn btn-danger w-100">Confirm Request</button>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const donors = [
{name:"John Doe",blood:"A+",city:"Delhi",status:"Available",aiRank:95},
{name:"Sarah Khan",blood:"O+",city:"Mumbai",status:"Available",aiRank:88},
{name:"Rohit Sharma",blood:"B+",city:"Chandigarh",status:"Busy",aiRank:92},
{name:"Aman Singh",blood:"AB+",city:"Ludhiana",status:"Available",aiRank:85},
{name:"Raj Mehta",blood:"O+",city:"Delhi",status:"Available",aiRank:97}
];

let currentPage=1;
const perPage=4;
let filteredData=donors;

/* Display Donors */
function displayDonors(data,page=1){
const container=document.getElementById("donorContainer");
container.innerHTML="";

let start=(page-1)*perPage;
let end=start+perPage;
let paginated=data.slice(start,end);

paginated.forEach(d=>{
container.innerHTML+=`
<div class="col-md-6 mb-4">
<div class="card p-3">
<div class="d-flex justify-content-between">
<h5>${d.name}</h5>
<span class="badge bg-danger">${d.blood}</span>
</div>
<p>${d.city}</p>
<p>Status: <span class="badge ${d.status==="Available"?"bg-success":"bg-secondary"}">${d.status}</span></p>
<span class="badge ai-badge text-white">AI Rank: ${d.aiRank}</span>
<div class="mt-3">
<button class="btn btn-outline-danger btn-sm" onclick="showProfile('${d.name}','${d.city}','${d.blood}','${d.aiRank}')">View</button>
<button class="btn btn-danger btn-sm" onclick="showRequest()">Request</button>
</div>
</div>
</div>`;
});

document.getElementById("resultCount").innerText=data.length+" Results Found";
createPagination(data);
}

/* Pagination */
function createPagination(data){
let pages=Math.ceil(data.length/perPage);
let pagination=document.getElementById("pagination");
pagination.innerHTML="";
for(let i=1;i<=pages;i++){
pagination.innerHTML+=`
<li class="page-item ${i===currentPage?'active':''}">
<a class="page-link" href="#" onclick="changePage(${i})">${i}</a>
</li>`;
}
}

function changePage(page){
currentPage=page;
displayDonors(filteredData,currentPage);
}

/* Filter */
function filterDonors(){
document.getElementById("loader").style.display="block";

setTimeout(()=>{

let search=document.getElementById("searchInput").value.toLowerCase();
let blood=document.getElementById("bloodGroup").value;
let availability=document.getElementById("availability").value;
let minRating=document.getElementById("minRating").value;

filteredData=donors.filter(d=>
(d.name.toLowerCase().includes(search)||d.city.toLowerCase().includes(search)) &&
(blood===""||d.blood===blood) &&
(availability===""||d.status===availability) &&
(minRating===""||d.aiRank>=minRating)
);

currentPage=1;
displayDonors(filteredData,currentPage);
document.getElementById("loader").style.display="none";

},500);
}

/* Profile Modal */
function showProfile(name,city,blood,rank){
document.getElementById("profileTitle").innerText=name;
document.getElementById("profileBody").innerHTML=`
<p><strong>City:</strong> ${city}</p>
<p><strong>Blood Group:</strong> ${blood}</p>
<p><strong>AI Reliability Rank:</strong> ${rank}</p>
<p>This donor is verified and connected with LifeLink network.</p>
`;
new bootstrap.Modal(document.getElementById('profileModal')).show();
}

/* Request Modal */
function showRequest(){
new bootstrap.Modal(document.getElementById('requestModal')).show();
}

displayDonors(donors);

</script>

</body>
</html>
