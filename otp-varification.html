<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LifeLink | OTP Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:Segoe UI;
}

.auth-container{
max-width:420px;
margin:auto;
margin-top:120px;
}

.card{
border-radius:12px;
border:none;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo{
font-size:26px;
font-weight:bold;
color:#e63946;
}

.otp-input{
width:45px;
height:50px;
text-align:center;
font-size:22px;
margin:4px;
border-radius:8px;
border:1px solid #ccc;
}

.otp-input:focus{
border-color:#e63946;
box-shadow:0 0 5px rgba(230,57,70,.4);
}

.security-info{
font-size:13px;
color:#777;
margin-top:15px;
}

.resend{
font-size:14px;
cursor:pointer;
color:#e63946;
}

</style>

</head>

<body>

<div class="container">

<div class="auth-container">

<div class="card p-4">

<div class="text-center">

<div class="logo">LifeLink</div>

<h4 class="mt-2">OTP Verification</h4>

<p class="text-muted">
Enter the 6-digit code sent to your email or phone
</p>

</div>

<form id="otpForm">

<div class="d-flex justify-content-center mb-3">

<input type="text" maxlength="1" class="otp-input">
<input type="text" maxlength="1" class="otp-input">
<input type="text" maxlength="1" class="otp-input">
<input type="text" maxlength="1" class="otp-input">
<input type="text" maxlength="1" class="otp-input">
<input type="text" maxlength="1" class="otp-input">

</div>

<button class="btn btn-danger w-100" type="submit">
Verify OTP
</button>

</form>

<div class="text-center mt-3">

<span id="timer">Resend OTP in 30s</span>

<br>

<span class="resend d-none" id="resendBtn">
Resend OTP
</span>

</div>

<hr>

<div class="security-info">

<p>🔐 Multi-Factor Authentication Security</p>
<p>🛡 AI fraud detection monitoring</p>
<p>📍 Device & location verification</p>
<p>⚙ Enterprise security compliance</p>

</div>

</div>

</div>

</div>

<script>

const inputs=document.querySelectorAll(".otp-input");

inputs.forEach((input,index)=>{

input.addEventListener("keyup",function(e){

if(this.value.length===1 && index<5){
inputs[index+1].focus();
}

if(e.key==="Backspace" && index>0){
inputs[index-1].focus();
}

});

});

document.getElementById("otpForm").addEventListener("submit",function(e){

e.preventDefault();

let otp="";

inputs.forEach(i=>{
otp+=i.value;
});

fetch("/api/verify-otp",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
otp:otp
})

})
.then(res=>res.json())
.then(data=>{

alert("OTP Verified Successfully");

window.location="dashboard.html";

})
.catch(err=>{

alert("Invalid OTP");

});

});

let time=30;

let timer=document.getElementById("timer");

let resend=document.getElementById("resendBtn");

let interval=setInterval(()=>{

time--;

timer.innerText="Resend OTP in "+time+"s";

if(time<=0){

clearInterval(interval);

timer.classList.add("d-none");

resend.classList.remove("d-none");

}

},1000);

resend.onclick=function(){

alert("OTP resent");

location.reload();

}

</script>

</body>

</html>
