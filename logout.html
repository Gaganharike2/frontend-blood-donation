```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LifeLink | Logout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:Segoe UI;
}

.auth-container{
max-width:420px;
margin:auto;
margin-top:150px;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo{
font-size:26px;
font-weight:bold;
color:#e63946;
}

.logout-icon{
font-size:60px;
color:#e63946;
}

.security-info{
font-size:13px;
color:#777;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="auth-container">

<div class="card p-4 text-center">

<div class="logo">LifeLink</div>

<div class="logout-icon">🚪</div>

<h4 class="mt-2">Logout</h4>

<p class="text-muted">

Are you sure you want to logout from your account?

</p>

<div class="d-grid gap-2">

<button id="logoutBtn" class="btn btn-danger">
Logout
</button>

<a href="dashboard.html" class="btn btn-outline-secondary">
Cancel
</a>

</div>

<hr>

<div class="security-info">

<p>🔐 Secure session termination</p>
<p>🛡 Security log recorded</p>
<p>⚙ Enterprise authentication protection</p>

</div>

</div>

</div>

</div>

<script>

document.getElementById("logoutBtn").addEventListener("click",function(){

fetch("/api/logout",{

method:"POST",
headers:{
"Content-Type":"application/json"
}

})
.then(res=>res.json())
.then(data=>{

// Clear local session
localStorage.clear();
sessionStorage.clear();

// Redirect to login
window.location="login.html";

})
.catch(err=>{

alert("Logout failed");

});

});

</script>

</body>

</html>
