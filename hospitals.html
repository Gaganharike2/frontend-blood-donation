<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeLink | Hospitals</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;background:#f5f7fb}
.hero{
height:45vh;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}
.search-box{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
.card{
border:none;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}
.card:hover{transform:translateY(-5px)}
.badge-status{background:#ff416c}
.map-container{height:350px;border-radius:20px;overflow:hidden}
.footer{background:#111;color:white;padding:30px;text-align:center}
.sidebar{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
<div class="container">
<a class="navbar-brand" href="index.html">
<img src="images/Logo.png" width="170">
</a>
<div class="ms-auto">
<a href="login.html" class="btn btn-outline-danger btn-sm me-2">Login</a>
<a href="register.html" class="btn btn-danger btn-sm">Register</a>
</div>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1 class="fw-bold">Hospital Discovery Network</h1>
<p>Real-Time Blood Availability & Emergency Support</p>
</div>
</section>

<div class="container mt-5">
<div class="row">

<!-- ADVANCED FILTER SIDEBAR -->
<div class="col-md-3">
<div class="sidebar">
<h5>Advanced Filters</h5>
<hr>

<select class="form-select mb-3" id="cityFilter">
<option value="">City</option>
<option>Delhi</option>
<option>Mumbai</option>
<option>Chandigarh</option>
</select>

<select class="form-select mb-3" id="stockFilter">
<option value="">Stock Status</option>
<option value="High">High</option>
<option value="Low">Low</option>
</select>

<select class="form-select mb-3" id="ratingFilter">
<option value="">Minimum Rating</option>
<option value="4.5">4.5+</option>
<option value="4.8">4.8+</option>
</select>

<button class="btn btn-danger w-100" onclick="filterHospitals()">Apply Filters</button>

</div>
</div>

<!-- MAIN CONTENT -->
<div class="col-md-9">

<!-- LIVE STOCK COUNTERS -->
<div class="row text-center mb-4">
<div class="col-md-4">
<h4 id="totalHospitals">0</h4>
<p>Total Hospitals</p>
</div>
<div class="col-md-4">
<h4 id="highStock">0</h4>
<p>High Stock</p>
</div>
<div class="col-md-4">
<h4 id="lowStock">0</h4>
<p>Low Stock</p>
</div>
</div>

<!-- GOOGLE MAP -->
<div class="map-container mb-4">
<iframe
width="100%"
height="100%"
frameborder="0"
style="border:0"
src="https://maps.google.com/maps?q=India&t=&z=5&ie=UTF8&iwloc=&output=embed"
allowfullscreen>
</iframe>
</div>

<!-- HOSPITAL LIST -->
<div class="row" id="hospitalList"></div>

<!-- PAGINATION -->
<nav>
<ul class="pagination justify-content-center mt-4" id="pagination"></ul>
</nav>

</div>
</div>
</div>

<!-- HOSPITAL DETAILS MODAL -->
<div class="modal fade" id="hospitalModal">
<div class="modal-dialog modal-lg">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title" id="modalTitle"></h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body" id="modalBody"></div>
</div>
</div>
</div>

<!-- FOOTER -->
<footer class="footer mt-5">
<h5>LifeLink</h5>
<p>Global Blood Donation Network</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const hospitals = [
{name:"City Care Hospital",city:"Delhi",rating:4.8,stock:"High"},
{name:"Red Cross Medical",city:"Mumbai",rating:4.5,stock:"Low"},
{name:"LifeLine Hospital",city:"Chandigarh",rating:4.9,stock:"High"},
{name:"Metro Health",city:"Delhi",rating:4.6,stock:"Low"},
{name:"Apollo Care",city:"Mumbai",rating:4.7,stock:"High"}
];

let currentPage = 1;
const perPage = 3;

function updateCounters(data){
document.getElementById("totalHospitals").innerText=data.length;
document.getElementById("highStock").innerText=data.filter(h=>h.stock==="High").length;
document.getElementById("lowStock").innerText=data.filter(h=>h.stock==="Low").length;
}

function displayHospitals(data,page=1){
const container=document.getElementById("hospitalList");
container.innerHTML="";

let start=(page-1)*perPage;
let end=start+perPage;
let paginated=data.slice(start,end);

paginated.forEach(h=>{
container.innerHTML+=`
<div class="col-md-6 mb-4">
<div class="card p-4">
<h5>${h.name}</h5>
<p><i class="fa fa-map-marker-alt text-danger"></i> ${h.city}</p>
<p>⭐ ${h.rating}</p>
<span class="badge badge-status mb-2">${h.stock} Stock</span>
<button class="btn btn-outline-danger btn-sm mt-2" onclick="showDetails('${h.name}','${h.city}','${h.rating}','${h.stock}')">View Details</button>
</div>
</div>`;
});

updateCounters(data);
createPagination(data);
}

function createPagination(data){
let pages=Math.ceil(data.length/perPage);
let pagination=document.getElementById("pagination");
pagination.innerHTML="";
for(let i=1;i<=pages;i++){
pagination.innerHTML+=`
<li class="page-item ${i===currentPage?'active':''}">
<a class="page-link" href="#" onclick="changePage(${i})">${i}</a>
</li>`;
}
}

function changePage(page){
currentPage=page;
displayHospitals(filteredData,currentPage);
}

let filteredData=hospitals;

function filterHospitals(){
let city=document.getElementById("cityFilter").value;
let stock=document.getElementById("stockFilter").value;
let rating=document.getElementById("ratingFilter").value;

filteredData=hospitals.filter(h=>{
return (city===""||h.city===city) &&
(stock===""||h.stock===stock) &&
(rating===""||h.rating>=rating);
});

currentPage=1;
displayHospitals(filteredData,currentPage);
}

function showDetails(name,city,rating,stock){
document.getElementById("modalTitle").innerText=name;
document.getElementById("modalBody").innerHTML=`
<p><strong>City:</strong> ${city}</p>
<p><strong>Rating:</strong> ${rating}</p>
<p><strong>Stock Status:</strong> ${stock}</p>
<p>This hospital is connected with LifeLink National Blood Grid.</p>
`;
new bootstrap.Modal(document.getElementById('hospitalModal')).show();
}

displayHospitals(hospitals);

</script>

</body>
</html>
