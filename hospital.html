<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeLink - Hospitals</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
background:#f4f6fb;
}
.sidebar{
height:100vh;
background:linear-gradient(180deg,#ff416c,#ff4b2b);
color:white;
position:fixed;
width:240px;
padding:20px;
}
.sidebar a{
color:white;
display:block;
padding:10px;
text-decoration:none;
border-radius:8px;
margin-bottom:8px;
}
.sidebar a:hover{
background:rgba(255,255,255,0.2);
}
.main{
margin-left:250px;
padding:30px;
}
.card{
border:none;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
.badge-verified{
background:#28a745;
}
.badge-emergency{
background:#dc3545;
}
.inventory-table td{
font-size:14px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h4>🩸 LifeLink</h4>
<hr>
<a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
<a href="#"><i class="fa fa-hospital"></i> Hospitals</a>
<a href="#"><i class="fa fa-tint"></i> Requests</a>
<a href="#"><i class="fa fa-map"></i> Map</a>
<a href="#"><i class="fa fa-chart-line"></i> Analytics</a>
</div>

<div class="main">

<h2 class="mb-4">Hospital Directory</h2>

<!-- SEARCH ENGINE -->
<div class="card p-4 mb-4">
<div class="row g-3">

<div class="col-md-3">
<input type="text" class="form-control" placeholder="Search by Name">
</div>

<div class="col-md-3">
<input type="text" class="form-control" placeholder="City">
</div>

<div class="col-md-3">
<select class="form-select">
<option>Filter</option>
<option>24/7 Available</option>
<option>Emergency Ready</option>
<option>Verified</option>
</select>
</div>

<div class="col-md-3">
<button class="btn btn-danger w-100" onclick="loadHospitals()">
<i class="fa fa-search"></i> Search
</button>
</div>

</div>
</div>

<!-- AI ALERT -->
<div class="alert alert-info" id="aiAlert">
AI analyzing regional shortage...
</div>

<!-- HOSPITAL CARDS -->
<div class="row" id="hospitalContainer"></div>

<!-- INVENTORY SECTION -->
<div class="card p-4 mt-4">
<h4>Blood Inventory Overview</h4>
<table class="table inventory-table">
<thead>
<tr>
<th>Blood Group</th>
<th>Available Units</th>
<th>Status</th>
</tr>
</thead>
<tbody>
<tr>
<td>A+</td>
<td>12</td>
<td><span class="badge bg-success">Normal</span></td>
</tr>
<tr>
<td>O+</td>
<td>3</td>
<td><span class="badge bg-danger">Critical</span></td>
</tr>
</tbody>
</table>
</div>

<!-- ANALYTICS -->
<div class="card p-4 mt-4">
<h4>Demand Analytics</h4>
<canvas id="chart"></canvas>
</div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

/* AJAX LOAD HOSPITALS */
function loadHospitals(){
let container=document.getElementById("hospitalContainer");
container.innerHTML="<p>Loading hospitals...</p>";

fetch("https://jsonplaceholder.typicode.com/users?_limit=6")
.then(res=>res.json())
.then(data=>{
container.innerHTML="";
data.forEach(hospital=>{
container.innerHTML+=`
<div class="col-md-4 mb-4">
<div class="card p-3">
<h5>${hospital.company.name}</h5>
<p><i class="fa fa-map-marker-alt"></i> ${hospital.address.city}</p>
<p>
<span class="badge badge-verified">Verified</span>
<span class="badge badge-emergency">Emergency</span>
</p>
<p>Response Time: 12 mins</p>
<div class="d-flex justify-content-between">
<button class="btn btn-outline-primary btn-sm">
<i class="fa fa-eye"></i> View
</button>
<button class="btn btn-outline-success btn-sm">
<i class="fa fa-paper-plane"></i> Request
</button>
<button class="btn btn-outline-danger btn-sm">
<i class="fa fa-comments"></i> Chat
</button>
</div>
</div>
</div>
`;
});
});
}

/* INITIAL LOAD */
loadHospitals();

/* AI SIMULATION */
setTimeout(()=>{
document.getElementById("aiAlert").innerText =
"AI Suggestion: O+ shortage in your area. 2 hospitals nearby with available stock.";
},2000);

/* CHART */
new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["A+","B+","O+","AB+"],
datasets:[{
label:"Monthly Demand",
data:[12,19,8,5],
backgroundColor:"#ff416c"
}]
}
});

</script>

</body>
</html>
