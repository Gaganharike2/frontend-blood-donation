<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeLink | Secure Registration</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
background:linear-gradient(135deg,#ff416c,#ff4b2b);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Segoe UI',sans-serif;
}

.register-card{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
width:100%;
max-width:550px;
transition:0.3s;
max-height:95vh;
overflow-y:auto;
}

.dark-mode{
background:#1e293b !important;
color:white;
}

.password-toggle{
position:absolute;
top:38px;
right:15px;
cursor:pointer;
}

.spinner{
display:none;
}
</style>
</head>

<body>

<div class="register-card" id="registerCard">

<div class="d-flex justify-content-between mb-3">
<h4>🩸 LifeLink Registration</h4>
<i class="fa fa-moon" style="cursor:pointer" onclick="toggleDark()"></i>
</div>

<div id="alertBox"></div>

<form id="registerForm">

<!-- Role Selection -->
<div class="mb-3">
<label class="form-label">Select Role</label>
<select class="form-select" id="roleSelect" onchange="toggleRole()" required>
<option value="donor">Donor</option>
<option value="hospital">Hospital</option>
<option value="admin">Admin (Restricted)</option>
</select>
</div>

<!-- Basic Info -->
<div class="row">
<div class="col-md-6 mb-3">
<label>First Name</label>
<input type="text" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Last Name</label>
<input type="text" class="form-control" required>
</div>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" class="form-control" required>
</div>

<!-- Password -->
<div class="mb-3 position-relative">
<label>Password</label>
<input type="password" class="form-control" id="password" onkeyup="checkStrength()" required>
<i class="fa fa-eye password-toggle" onclick="togglePassword()"></i>
<small id="strengthText"></small>
</div>

<div class="mb-3">
<label>Confirm Password</label>
<input type="password" class="form-control" required>
</div>

<!-- Donor Fields -->
<div id="donorFields">

<div class="mb-3">
<label>Blood Group</label>
<select class="form-select">
<option>A+</option>
<option>B+</option>
<option>O+</option>
<option>AB+</option>
</select>
</div>

<div class="mb-3">
<label>Last Donation Date</label>
<input type="date" class="form-control">
</div>

</div>

<!-- Hospital Fields -->
<div id="hospitalFields" style="display:none;">

<div class="mb-3">
<label>Hospital Name</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label>License Upload</label>
<input type="file" class="form-control">
</div>

<div class="mb-3">
<label>24/7 Emergency Service</label>
<select class="form-select">
<option>Yes</option>
<option>No</option>
</select>
</div>

</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" required>
<label class="form-check-label">I agree to Terms & Privacy Policy</label>
</div>

<button type="submit" class="btn btn-danger w-100">
<span id="btnText">Register</span>
<span class="spinner-border spinner-border-sm spinner" id="spinner"></span>
</button>

</form>

<hr>

<div class="text-center">
<p>Already have an account?</p>
<a href="login.html" class="btn btn-outline-danger w-100">Login Here</a>
</div>

</div>

<!-- OTP Modal -->
<div class="modal fade" id="otpModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">OTP Verification</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<input type="text" class="form-control" placeholder="Enter OTP">
</div>
<div class="modal-footer">
<button class="btn btn-success">Verify</button>
</div>
</div>
</div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* Dark Mode */
function toggleDark(){
document.getElementById("registerCard").classList.toggle("dark-mode");
}

/* Toggle Role Fields */
function toggleRole(){
let role=document.getElementById("roleSelect").value;
if(role==="hospital"){
document.getElementById("hospitalFields").style.display="block";
document.getElementById("donorFields").style.display="none";
}else{
document.getElementById("hospitalFields").style.display="none";
document.getElementById("donorFields").style.display="block";
}
}

/* Toggle Password */
function togglePassword(){
let input=document.getElementById("password");
input.type = input.type==="password" ? "text" : "password";
}

/* Password Strength */
function checkStrength(){
let pass=document.getElementById("password").value;
let strength="Weak";
if(pass.length>6) strength="Medium";
if(pass.length>10 && /[A-Z]/.test(pass)) strength="Strong";
document.getElementById("strengthText").innerText="Strength: "+strength;
}

/* AJAX Register */
document.getElementById("registerForm").addEventListener("submit",function(e){
e.preventDefault();

document.getElementById("spinner").style.display="inline-block";
document.getElementById("btnText").innerText="Processing...";

fetch("https://jsonplaceholder.typicode.com/posts",{
method:"POST",
body:JSON.stringify({status:"register"}),
headers:{"Content-type":"application/json; charset=UTF-8"}
})
.then(res=>res.json())
.then(data=>{
document.getElementById("spinner").style.display="none";
document.getElementById("btnText").innerText="Register";

document.getElementById("alertBox").innerHTML =
'<div class="alert alert-success">Registration Successful! Please verify OTP.</div>';

new bootstrap.Modal(document.getElementById('otpModal')).show();
});
});

</script>

</body>
</html>
